<div class="group relative bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 cursor-pointer overflow-hidden border border-gray-100 hover:border-blue-200 hover:-translate-y-1" (click)="onServiceClick()">
  <!-- Rating Badge -->
  <div class="absolute top-4 right-4 z-10">
    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-800 border border-yellow-200">
      <svg class="w-3 h-3 mr-1 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
      {{ service.rating }}
    </span>
  </div>

  <!-- Service Icon with Background -->
  <div class="p-6 pb-4">
    <div class="w-16 h-16 bg-gradient-to-br from-blue-50 to-blue-100 rounded-2xl flex items-center justify-center mb-4 group-hover:from-blue-100 group-hover:to-blue-200 transition-all duration-300">
      <span class="text-3xl">{{ service.icon }}</span>
    </div>
    
    <!-- Service Content -->
    <div class="space-y-2">
      <h3 class="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors duration-300">
        {{ service.name }}
      </h3>
      
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <span class="text-sm text-gray-500">A partir de</span>
          <span class="text-xl font-bold text-blue-600">{{ service.price }}</span>
          <span class="text-sm font-medium text-gray-600">{{ service.currency }}</span>
        </div>
      </div>
      
      <!-- Availability Indicator -->
      <div class="flex items-center space-x-2 mt-3">
        <div class="w-2 h-2 rounded-full animate-pulse" [class]="getAvailabilityColor()"></div>
        <span class="text-xs text-gray-500 font-medium">{{ getAvailabilityText() }}</span>
      </div>
    </div>
  </div>

  <!-- Hover Effect Overlay -->
  <div class="absolute inset-0 bg-gradient-to-t from-blue-50/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
  
  <!-- Bottom Border Accent -->
  <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-500 to-blue-600 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-left"></div>
</div>
